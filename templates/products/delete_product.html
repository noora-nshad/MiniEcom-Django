<!DOCTYPE html>
<html>
<head>
    <title>Delete Product</title>
</head>
<body>

<h2>Delete Product</h2>

<p>Are you sure you want to delete "{{ product.name }}"?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<br>

<a href="{% url 'product_list' %}">Cancel</a>

</body>
</html>
